<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hypertrophy">
<meta name="theme-color" content="#0a0a0c">
<meta name="description" content="14-Week Hypertrophy Program — PPL Split with set logging">

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/style.css">
<title>14-Week Hypertrophy</title>
</head>
<body>

<div id="app">

  <!-- VIEWS -->
  <div id="view-workout"  class="view"></div>
  <div id="view-progress" class="view" hidden></div>
  <div id="view-overview" class="view" hidden></div>

  <!-- BOTTOM NAV -->
  <nav>
    <button class="nav-btn active" data-tab="workout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 6.5h11M6.5 17.5h11M3 12h18"/>
        <circle cx="6.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="6.5" cy="17.5" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="17.5" cy="17.5" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
      Workout
    </button>
    <button class="nav-btn" data-tab="progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Progress
    </button>
    <button class="nav-btn" data-tab="overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Overview
    </button>
  </nav>

  <!-- EXERCISE MODAL -->
  <div id="modal-overlay" class="modal-overlay">
    <div id="modal" class="modal"></div>
  </div>

</div>

<script src="/app.js"></script>
</body>
</html>
