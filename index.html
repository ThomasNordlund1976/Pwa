<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hypertrophy">
<meta name="theme-color" content="#0a0a0c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>14-Week Hypertrophy</title>
<style>


:root {
  --bg: #0a0a0c;
  --bg2: #111116;
  --bg3: #18181f;
  --surface: #1c1c24;
  --surface2: #22222c;
  --border: #2a2a36;
  --border2: #333342;
  --accent: #d4ff00;
  --accent-dim: rgba(212,255,0,0.12);
  --text: #f2f2f4;
  --text2: #9999aa;
  --text3: #55556a;
  --push: #4d8bff;
  --pull: #ff6b35;
  --lower: #00d4a1;
  --delts: #b97dff;
  --cb: #ff4d72;
  --rest: #44445a;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', -apple-system, sans-serif; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.view { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }
.hidden { display: none; }
nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; background: none; border: none; color: var(--text3); font-family: 'DM Sans', -apple-system, sans-serif; font-size: 10px; font-weight: 500; cursor: pointer; }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.active { color: var(--accent); }
.page-header { padding: 20px 20px 14px; padding-top: calc(20px + env(safe-area-inset-top)); position: sticky; top: 0; background: var(--bg); z-index: 50; border-bottom: 1px solid var(--border); }
.page-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 0.04em; line-height: 1; }
.page-header h1 span { color: var(--accent); }
.page-header p { font-size: 12px; color: var(--text2); margin-top: 3px; font-weight: 300; }
.week-strip { display: flex; gap: 8px; padding: 14px 20px; overflow-x: auto; scrollbar-width: none; }
.week-strip::-webkit-scrollbar { display: none; }
.wchip { flex-shrink: 0; padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.wchip.active { background: var(--accent); color: #0a0a0c; border-color: var(--accent); font-weight: 700; }
.week-banner { margin: 0 16px 12px; border-radius: var(--radius); padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.wb-left { display: flex; flex-direction: column; gap: 2px; }
.wb-phase { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; }
.wb-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.04em; color: var(--text); line-height: 1; }
.wb-stats { display: flex; gap: 16px; flex-shrink: 0; }
.wb-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.wb-val { font-family: 'Bebas Neue', sans-serif; font-size: 20px; line-height: 1; }
.wb-lbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); font-family: 'DM Mono', monospace; }
.p-foundation { background: rgba(77,139,255,0.1); border: 1px solid rgba(77,139,255,0.2); }
.p-foundation .wb-phase, .p-foundation .wb-val { color: #4d8bff; }
.p-deload { background: rgba(212,255,0,0.07); border: 1px solid rgba(212,255,0,0.2); }
.p-deload .wb-phase, .p-deload .wb-val { color: var(--accent); }
.p-intensify { background: rgba(255,160,32,0.1); border: 1px solid rgba(255,160,32,0.2); }
.p-intensify .wb-phase, .p-intensify .wb-val { color: #ffa020; }
.p-peak { background: rgba(255,77,114,0.1); border: 1px solid rgba(255,77,114,0.2); }
.p-peak .wb-phase, .p-peak .wb-val { color: #ff4d72; }
.coach-note { margin: 0 16px 16px; padding: 12px 14px; background: var(--surface); border-radius: var(--radius-sm); border-left: 3px solid var(--accent); font-size: 12px; color: var(--text2); line-height: 1.65; font-weight: 300; }
.day-section { margin: 0 16px 14px; }
.day-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: var(--radius) var(--radius) 0 0; border: 1px solid var(--border); border-bottom: none; }
.day-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.day-day { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; }
.day-type { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.04em; line-height: 1; flex: 1; }
.day-sub { font-size: 10px; color: var(--text2); }
.t-push .day-type { color: var(--push); } .t-push .day-dot { background: var(--push); } .t-push .day-header { background: rgba(77,139,255,0.06); border-color: rgba(77,139,255,0.2); }
.t-pull .day-type { color: var(--pull); } .t-pull .day-dot { background: var(--pull); } .t-pull .day-header { background: rgba(255,107,53,0.06); border-color: rgba(255,107,53,0.2); }
.t-lower .day-type { color: var(--lower); } .t-lower .day-dot { background: var(--lower); } .t-lower .day-header { background: rgba(0,212,161,0.06); border-color: rgba(0,212,161,0.2); }
.t-delts .day-type { color: var(--delts); } .t-delts .day-dot { background: var(--delts); } .t-delts .day-header { background: rgba(185,125,255,0.06); border-color: rgba(185,125,255,0.2); }
.t-cb .day-type { color: var(--cb); } .t-cb .day-dot { background: var(--cb); } .t-cb .day-header { background: rgba(255,77,114,0.06); border-color: rgba(255,77,114,0.2); }
.t-rest .day-header { background: var(--surface); border-color: var(--border); opacity: 0.5; } .t-rest .day-type { color: var(--rest); } .t-rest .day-dot { background: var(--rest); }
.ex-list { background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; }
.ex-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; gap: 10px; }
.ex-row:last-child { border-bottom: none; }
.ex-row:active { background: var(--surface2); }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ex-last { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.ex-last.has { color: var(--text2); }
.ex-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.ex-rx { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
.ex-bubble { width: 30px; height: 30px; border-radius: 50%; background: var(--bg3); border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--text3); }
.ex-bubble.done { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.rest-msg { padding: 14px; font-size: 12px; color: var(--text3); font-style: italic; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; padding-bottom: calc(90px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); }
.overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 0; }
.modal-head { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); }
.modal-daytype { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 0.03em; color: var(--text); line-height: 1; }
.modal-sub { font-size: 12px; color: var(--text2); margin-top: 4px; font-family: 'DM Mono', monospace; }
.modal-hint { font-size: 11px; color: var(--text3); margin-top: 5px; font-family: 'DM Mono', monospace; }
.set-logger { padding: 16px 20px; }
.logger-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 12px; }
.set-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.set-num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); width: 36px; text-align: center; flex-shrink: 0; }
.set-inputs { display: flex; gap: 8px; flex: 1; }
.field-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.field-lbl { font-size: 9px; text-align: center; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
.set-input { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; text-align: center; padding: 10px 6px; outline: none; -webkit-appearance: none; appearance: none; }
.set-input:focus { border-color: var(--accent); }
input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
.check-btn { width: 38px; height: 46px; border-radius: var(--radius-sm); border: 1.5px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.check-btn.done { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.history-sec { padding: 0 20px 16px; border-top: 1px solid var(--border); }
.history-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; padding: 14px 0 10px; }
.hist-entry { margin-bottom: 10px; }
.hist-wk { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
.hist-sets { display: flex; gap: 6px; flex-wrap: wrap; }
.hist-set { padding: 4px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
.no-hist { font-size: 12px; color: var(--text3); font-style: italic; }
.modal-actions { padding: 8px 20px 0; display: flex; flex-direction: column; gap: 8px; }
.btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; border-radius: var(--radius); border: none; font-family: 'DM Sans', -apple-system, sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--accent); color: #0a0a0c; }
.btn-ghost { background: var(--surface2); color: var(--text2); }
.prog-content { padding: 16px; }
.prog-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.prog-card-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
.stat-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.stat-row:last-child { margin-bottom: 0; }
.stat-name { font-size: 13px; color: var(--text2); }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); line-height: 1; }
.stat-unit { font-size: 11px; color: var(--text3); margin-left: 3px; font-family: 'DM Mono', monospace; }
.progress-bar-wrap { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.progress-bar { height: 100%; background: var(--accent); border-radius: 3px; }
.pr-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.pr-row:last-child { border-bottom: none; }
.pr-ex { font-size: 12px; color: var(--text2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pr-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); flex-shrink: 0; margin-left: 12px; }
.ov-content { padding: 16px; }
.phase-card { border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 12px; }
.pc-head { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; }
.pc-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.04em; line-height: 1; }
.pc-weeks { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
.pc-body { padding: 10px 14px 14px; background: var(--surface); display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
.pc-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; line-height: 1; }
.pc-stat-lbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
.pc-note { padding: 10px 14px 12px; background: var(--surface); border-top: 1px solid var(--border); font-size: 11px; color: var(--text2); line-height: 1.6; font-weight: 300; }
.pc-f .pc-head { background: rgba(77,139,255,0.1); } .pc-f .pc-name { color: #4d8bff; }
.pc-d .pc-head { background: rgba(212,255,0,0.08); } .pc-d .pc-name { color: var(--accent); }
.pc-i .pc-head { background: rgba(255,160,32,0.1); } .pc-i .pc-name { color: #ffa020; }
.pc-p .pc-head { background: rgba(255,77,114,0.1); } .pc-p .pc-name { color: #ff4d72; }
.info-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
.info-card-head { padding: 12px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.04em; }
.info-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-bottom: 1px solid var(--border); }
.info-row:last-child { border-bottom: none; }
.info-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
.info-day { width: 72px; font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; flex-shrink: 0; }
.info-label { font-size: 13px; font-weight: 600; color: var(--text); }
.info-sub { font-size: 11px; color: var(--text2); font-weight: 300; }
.prin-row { padding: 12px 14px; border-bottom: 1px solid var(--border); }
.prin-row:last-child { border-bottom: none; }
.prin-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.prin-desc { font-size: 11px; color: var(--text2); line-height: 1.6; font-weight: 300; }
::-webkit-scrollbar { width: 0; background: transparent; }


/* WEEK COMPLETE */
.week-complete-bar { margin: 0 16px 12px; padding: 10px 14px; background: rgba(212,255,0,0.1); border: 1px solid rgba(212,255,0,0.3); border-radius: var(--radius-sm); display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--accent); font-weight: 600; }
.week-complete-bar svg { flex-shrink: 0; }

/* EXERCISE INFO POPUP */
.ex-info-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.ex-info-overlay.open { opacity: 1; pointer-events: all; }
.ex-info-popup { background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; max-height: 80vh; overflow-y: auto; padding-bottom: calc(90px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); }
.ex-info-overlay.open .ex-info-popup { transform: translateY(0); }
.ex-info-popup .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 0; }
.ex-info-body { padding: 16px 20px 8px; }
.ex-info-name { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.03em; color: var(--text); line-height: 1; margin-bottom: 4px; }
.ex-info-muscle { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
.ex-info-section { margin-bottom: 14px; }
.ex-info-section-title { font-size: 11px; font-weight: 600; color: var(--text); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
.ex-info-text { font-size: 13px; color: var(--text2); line-height: 1.7; font-weight: 300; }
.ex-info-tips { list-style: none; }
.ex-info-tips li { font-size: 13px; color: var(--text2); line-height: 1.6; font-weight: 300; padding: 4px 0; padding-left: 14px; position: relative; }
.ex-info-tips li::before { content: ""; position: absolute; left: 0; top: 11px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

/* REST TIMER */
.timer-bar { position: fixed; bottom: -200px; left: 0; right: 0; z-index: 250; display: flex; align-items: center; gap: 0; transition: bottom 0.3s cubic-bezier(0.32,0.72,0,1); pointer-events: none; }
.timer-bar.visible { bottom: calc(58px + env(safe-area-inset-bottom)); pointer-events: all; }
.timer-bar.visible { transform: translateY(0); }
.timer-inner { margin: 0 12px 8px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 14px; display: flex; align-items: center; gap: 12px; width: 100%; box-shadow: 0 -4px 24px rgba(0,0,0,0.4); }
.timer-ring { position: relative; width: 40px; height: 40px; flex-shrink: 0; }
.timer-ring svg { transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: var(--border2); stroke-width: 3; }
.timer-ring-fg { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.timer-ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: var(--text); }
.timer-text { flex: 1; }
.timer-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; }
.timer-countdown { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--text); line-height: 1; }
.timer-countdown.done { color: var(--accent); }
.timer-actions { display: flex; gap: 8px; }
.timer-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; }
.timer-btn.accent { background: var(--accent); color: #0a0a0c; border-color: var(--accent); font-weight: 700; }
.timer-settings { padding: 0 20px 16px; border-top: 1px solid var(--border); margin-top: 4px; }
.timer-settings-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; }
.timer-settings-label { font-size: 13px; color: var(--text2); }
.timer-dur-pick { display: flex; gap: 6px; }
.dur-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; -webkit-appearance: none; appearance: none; }
.dur-btn.active { background: var(--accent); color: #0a0a0c; border-color: var(--accent); font-weight: 700; }
.timer-adjust { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px 4px; border-top: 1px solid var(--border); margin-top: 4px; }
.timer-adjust-label { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; }
.quick-done-btn { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
.quick-done-btn.all-done { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.day-done-btn { margin-left: auto; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.day-done-btn.done { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

function setTimerDuration(sec) {
  timerDuration = sec;
  document.querySelectorAll(".dur-btn").forEach(function(b) {
    b.classList.toggle("active", +b.dataset.dur === sec);
  });
  // Save preference
  try { localStorage.setItem("hype14w_timer", sec); } catch(e) {}
}

function loadTimerPref() {
  try {
    var saved = localStorage.getItem("hype14w_timer");
    if (saved) timerDuration = +saved;
  } catch(e) {}
}

function startTimer() {
  stopTimer();
  timerRemaining = timerDuration;
  timerEndTime = Date.now() + timerDuration * 1000;
  var bar = document.getElementById("timer-bar");
  if (bar) bar.classList.add("visible");
  updateTimerDisplay();

    updateTimerDisplay();
    if (timerRemaining <= 0) { stopTimer(); timerDone(); }
  }, 250);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerRemaining = 0;
  var bar = document.getElementById("timer-bar");
  if (bar) bar.classList.remove("visible");
}

function timerDone() {
  var bar = document.getElementById("timer-bar");
  if (bar) bar.classList.add("visible");
  var cd = document.getElementById("timer-countdown");
  if (cd) { cd.textContent = "GO!"; cd.classList.add("done"); }
  playBeep();
  // Vibrate: three short pulses
  if (navigator.vibrate) { navigator.vibrate([200, 100, 200, 100, 400]); }
  if (typeof Notification !== "undefined" && Notification.permission === "granted") {
    new Notification("Rest over!", { body: "Time to hit your next set.", icon: "/Pwa/icon-192.png" });
  }
  setTimeout(function() {
    var bar2 = document.getElementById("timer-bar");
    if (bar2) bar2.classList.remove("visible");
    var cd2 = document.getElementById("timer-countdown");
    if (cd2) { cd2.textContent = String(Math.floor(timerDuration/60)) + ":" + (timerDuration%60 < 10 ? "0" : "") + (timerDuration%60); cd2.classList.remove("done"); }
  }, 3000);
}

function playBeep() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq, start, dur) {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq;
      o.type = "sine";
      g.gain.setValueAtTime(0.4, ctx.currentTime + start);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      o.start(ctx.currentTime + start);
      o.stop(ctx.currentTime + start + dur);
    }
    beep(880, 0,    0.15);
    beep(880, 0.18, 0.15);
    beep(1100,0.36, 0.3);
  } catch(e) {}
}

function updateTimerDisplay() {
  var cd = document.getElementById("timer-countdown");
  var ring = document.getElementById("timer-ring-fg");
  var lbl  = document.getElementById("timer-ring-label");
  if (!cd) return;
  var mins = Math.floor(timerRemaining / 60);
  var secs = timerRemaining % 60;
  cd.textContent = mins + ":" + (secs < 10 ? "0" : "") + secs;
  // Ring
  var pct = timerDuration > 0 ? timerRemaining / timerDuration : 0;
  var circ = 2 * Math.PI * 17; // r=17
  if (ring) {
    ring.style.strokeDasharray = circ;
    ring.style.strokeDashoffset = circ * (1 - pct);
  }
  if (lbl) lbl.textContent = timerRemaining <= 0 ? "" : "";
}

  if (typeof Notification !== "undefined" && Notification.permission === "default") {
    Notification.requestPermission();
  }
}

function dbLoad() { try { return JSON.parse(localStorage.getItem("hype14w") || "{}"); } catch(e) { return {}; } }
function dbSave(db) { try { localStorage.setItem("hype14w", JSON.stringify(db)); } catch(e) {} }
function dbKey(w, ex) { return "w" + w + "_" + ex; }
function dbGet(db, w, ex) { return db[dbKey(w, ex)] || null; }
function dbSet(db, w, ex, val) { db[dbKey(w, ex)] = val; dbSave(db); }

function getHistory(db, ex) {
  var out = [];
  for (var w = 1; w <= 14; w++) {
    var d = dbGet(db, w, ex);
    if (d && d.sets) {
      var hasSets = false;
      for (var i = 0; i < d.sets.length; i++) { if (d.sets[i].kg || d.sets[i].reps) { hasSets = true; break; } }
      if (hasSets) out.push({week:w, sets:d.sets, date:d.date||""});
    }
  }
  return out;
}
function getLastPerf(db, week, ex) {
  for (var w = week - 1; w >= 1; w--) {
    var d = dbGet(db, w, ex);
    if (d && d.sets) {
      var done = [];
      for (var i = 0; i < d.sets.length; i++) { if (d.sets[i].kg || d.sets[i].reps) done.push(d.sets[i]); }
      if (done.length) return {week:w, sets:done};
    }
  }
  return null;
}
function getDone(db, week, ex) {
  var d = dbGet(db, week, ex);
  if (!d || !d.sets) return 0;
  var c = 0;
  for (var i = 0; i < d.sets.length; i++) { if (d.sets[i].done) c++; }
  return c;
}

    '<button class="dur-btn" data-dur="120" onclick="setTimerDuration(120)">2:00</button>' +
    '<button class="dur-btn" data-dur="180" onclick="setTimerDuration(180)">3:00</button>' +
    '</div></div>' +
    '<div class="modal-actions">' +
    '<button class="btn btn-ghost" onclick="closeModal()">Done</button>' +
    '</div><div style="height:8px"></div>';

  g("overlay").classList.add("open");
  // highlight correct timer button
  setTimeout(function() {
    document.querySelectorAll(".dur-btn").forEach(function(b){
      b.classList.toggle("active", +b.dataset.dur === timerDuration);
    });
  }, 10);
}

function toggleCheck(i, suggestKg, repsPh) {
  var btn = g("chk" + i);
  btn.classList.toggle("done");
  if (btn.classList.contains("done")) {
    var kgEl = g("kg" + i);
    var rpEl = g("rp" + i);
    if (kgEl && !kgEl.value && suggestKg) kgEl.value = suggestKg;
    if (rpEl && !rpEl.value) rpEl.value = repsPh;
    startTimer();
  } else {
    stopTimer();
  }
  saveModalSilent();
}

function saveModalSilent() {
  var ex = curExName;
  var numSets = curNumSets;
  if (!ex) return;
  var db = dbLoad();
  var sets = [];
  for (var i = 0; i < numSets; i++) {
    var kgEl  = g("kg"  + i);
    var rpEl  = g("rp"  + i);
    var chkEl = g("chk" + i);
    sets.push({
      kg:   kgEl  ? kgEl.value  : "",
      reps: rpEl  ? rpEl.value  : "",
      done: chkEl ? chkEl.classList.contains("done") : false
    });
  }
  var now = new Date();
  var date = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
  dbSet(db, curWeek, ex, {sets: sets, date: date});
  // Update bubble and quick-done-btn without full re-render
  var totalDone = sets.filter(function(s){ return s.done; }).length;
  var safeExQ = encodeURIComponent(ex);
  var rows = document.querySelectorAll(".ex-row[data-ex=\"" + safeExQ + "\"][data-day=\"" + (dayIdx!==undefined?dayIdx:0) + "\"][data-week=\"" + (weekNum!==undefined?weekNum:curWeek) + "\"]");
  rows.forEach(function(row) {
    var bubble = row.querySelector(".ex-bubble");
    if (bubble) {
      bubble.textContent = totalDone + "/" + numSets;
      bubble.classList.toggle("done", totalDone >= numSets);
    }
    var qdBtn = row.querySelector(".quick-done-btn");
    if (qdBtn) qdBtn.classList.toggle("all-done", totalDone >= numSets);
  });
  checkWeekComplete();
}

function quickCompleteEx(safeEx, dayIdx, weekNum) {
  var ex = decodeURIComponent(safeEx);
  var db = dbLoad();
  var wk = WEEKS[curWeek - 1];
  var existing = dbGet(db, curWeek, ex);
  var now = new Date();
  var date = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");

  // If all sets already done -> unmark all. Otherwise mark all done.
  var allDone = existing && existing.sets && existing.sets.length >= wk.sets &&
                existing.sets.every(function(s){ return s.done; });

  var sets = [];
  var last = getLastPerf(db, curWeek, ex);
  for (var i = 0; i < wk.sets; i++) {
    var existSet = existing && existing.sets && existing.sets[i] ? existing.sets[i] : null;
    var lastSet  = last && last.sets && last.sets[i] ? last.sets[i] : null;
    var kg   = existSet && existSet.kg   ? existSet.kg   : (lastSet && lastSet.kg   ? lastSet.kg   : "");
    var reps = existSet && existSet.reps ? existSet.reps : (lastSet && lastSet.reps ? lastSet.reps : wk.reps.split("-")[0]);
    sets.push({kg: kg, reps: reps, done: !allDone});
  }
  dbSet(db, curWeek, ex, {sets: sets, date: date});
  // Silent update - just flip the bubble and quick-done-btn without re-rendering
  var totalDone = sets.filter(function(s){ return s.done; }).length;
  var safeExQ = encodeURIComponent(ex);
  var rows = document.querySelectorAll(".ex-row[data-ex=\"" + safeExQ + "\"][data-day=\"" + (dayIdx!==undefined?dayIdx:0) + "\"][data-week=\"" + (weekNum!==undefined?weekNum:curWeek) + "\"]");
  rows.forEach(function(row) {
    var bubble = row.querySelector(".ex-bubble");
    if (bubble) {
      bubble.textContent = totalDone + "/" + wk.sets;
      bubble.classList.toggle("done", totalDone >= wk.sets);
    }
    var qdBtn = row.querySelector(".quick-done-btn");
    if (qdBtn) qdBtn.classList.toggle("all-done", totalDone >= wk.sets);
  });
}


function markDayDone(dayIdx) {
  var db = dbLoad();
  var wk = WEEKS[curWeek - 1];
  var day = SPLIT[dayIdx];
  var now = new Date();
  var date = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
  for (var e = 0; e < day.ex.length; e++) {
    var ex = day.ex[e];
    var existing = dbGet(db, curWeek, ex);
    var last = getLastPerf(db, curWeek, ex);
    var allDone = existing && existing.sets && existing.sets.every(function(s){ return s.done; });
    if (allDone) continue;
    var sets = [];
    for (var i = 0; i < wk.sets; i++) {
      var existSet = existing && existing.sets && existing.sets[i] ? existing.sets[i] : null;
      var lastSet  = last && last.sets && last.sets[i] ? last.sets[i] : null;
      var kg   = (existSet && existSet.kg)   ? existSet.kg   : (lastSet && lastSet.kg   ? lastSet.kg   : "");
      var reps = (existSet && existSet.reps) ? existSet.reps : (lastSet && lastSet.reps ? lastSet.reps : wk.reps.split("-")[0]);
      sets.push({kg: kg, reps: reps, done: true});
    }
    dbSet(db, curWeek, ex, {sets: sets, date: date});
  }
  renderWorkout();
}

function closeModal() { g("overlay").classList.remove("open"); }
function overlayClick(e) { if (e.target === g("overlay")) closeModal(); }

function renderProgress() {
  var db = dbLoad();
  var totalSets = 0, totalEx = 0;
  var prs = {};
  var weeksLogged = {};

  for (var w = 1; w <= 14; w++) {
    for (var d = 0; d < SPLIT.length; d++) {
      var day = SPLIT[d];
      for (var e = 0; e < day.ex.length; e++) {
        var ex = day.ex[e];
        var data = dbGet(db, w, ex);
        if (data && data.sets) {
          var hasDone = false;
          for (var si = 0; si < data.sets.length; si++) {
            var s = data.sets[si];
            if (s.done || s.kg || s.reps) { hasDone = true; totalSets++; }
          }
          if (hasDone) {
            totalEx++;
            weeksLogged[w] = true;
            var maxKg = 0;
            for (var si2 = 0; si2 < data.sets.length; si2++) {
              if (data.sets[si2].kg && +data.sets[si2].kg > maxKg) maxKg = +data.sets[si2].kg;
            }
            if (maxKg > 0 && (!prs[ex] || maxKg > prs[ex].kg)) prs[ex] = {kg:maxKg, week:w};
          }
        }
      }
    }
  }

  var weeksCount = Object.keys(weeksLogged).length;
  var pct = Math.round((weeksCount / 14) * 100);
  var prArr = [];
  for (var exKey in prs) { prArr.push({ex:exKey, kg:prs[exKey].kg, week:prs[exKey].week}); }
  prArr.sort(function(a,b){ return b.kg - a.kg; });
  prArr = prArr.slice(0,12);

  var prHtml = "";
  if (prArr.length) {
    for (var pi = 0; pi < prArr.length; pi++) {
      prHtml += '<div class="pr-row"><div class="pr-ex">' + prArr[pi].ex + '</div><div class="pr-val">' + prArr[pi].kg + ' kg <span style="color:var(--text3);font-size:10px">Wk' + prArr[pi].week + '</span></div></div>';
    }
  } else { prHtml = '<div class="no-hist">No weights logged yet.</div>'; }

  var heatmap = "";
  for (var wi = 0; wi < WEEKS.length; wi++) {
    var ww = WEEKS[wi];
    var active = !!weeksLogged[ww.n];
    var col = active ? (ww.phase==="DELOAD"?"var(--accent)":ww.phase==="Peak"?"var(--cb)":"var(--push)") : "var(--surface2)";
    heatmap += '<div style="display:flex;flex-direction:column;align-items:center;gap:3px">' +
      '<div style="width:100%;aspect-ratio:1;border-radius:5px;background:' + col + ';opacity:' + (active?1:0.5) + '"></div>' +
      '<div style="font-size:9px;color:var(--text3);font-family:\'DM Mono\',monospace">W' + ww.n + '</div></div>';
  }

  g("v-progress").innerHTML =
    '<div class="page-header"><h1>YOUR <span>PROGRESS</span></h1><p>14-week tracking overview</p></div>' +
    '<div class="prog-content">' +
      '<div class="prog-card"><div class="prog-card-title">Program Progress</div>' +
        '<div class="stat-row"><div class="stat-name">Weeks active</div><div><span class="stat-val">' + weeksCount + '</span><span class="stat-unit">/ 14</span></div></div>' +
        '<div class="progress-bar-wrap"><div class="progress-bar" style="width:' + pct + '%"></div></div>' +
        '<div style="font-size:11px;color:var(--text3);margin-top:6px;font-family:\'DM Mono\',monospace;text-align:right">' + pct + '% complete</div>' +
      '</div>' +
      '<div class="prog-card"><div class="prog-card-title">Volume Summary</div>' +
        '<div class="stat-row"><div class="stat-name">Total sets logged</div><div><span class="stat-val">' + totalSets + '</span></div></div>' +
        '<div class="stat-row"><div class="stat-name">Exercise sessions</div><div><span class="stat-val">' + totalEx + '</span></div></div>' +
        '<div class="stat-row"><div class="stat-name">Exercises with PRs</div><div><span class="stat-val">' + prArr.length + '</span></div></div>' +
      '</div>' +
      '<div class="prog-card"><div class="prog-card-title">Top Weights (PRs)</div>' + prHtml + '</div>' +
      '<div class="prog-card"><div class="prog-card-title">Week Activity</div>' +
        '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:4px">' + heatmap + '</div>' +
      '</div>' +
    '</div>';
}

function renderOverview() {
  var phaseCards = "";
  for (var i = 0; i < PHASE_CARDS.length; i++) {
    var p = PHASE_CARDS[i];
    phaseCards += '<div class="phase-card ' + p.cls + '">' +
      '<div class="pc-head"><div class="pc-name">' + p.name + '</div><div class="pc-weeks">' + p.weeks + '</div></div>' +
      '<div class="pc-body">' +
        '<div><div class="pc-stat-val">' + p.sets + '</div><div class="pc-stat-lbl">Sets</div></div>' +
        '<div><div class="pc-stat-val">' + p.reps + '</div><div class="pc-stat-lbl">Reps</div></div>' +
        '<div><div class="pc-stat-val">' + p.rir + '</div><div class="pc-stat-lbl">RIR</div></div>' +
      '</div>' +

  var splitRows = "";

      '<div><div class="info-label">' + day.label + '</div><div class="info-sub">' + day.sub + '</div></div></div>';
  }

  var princRows = "";
  for (var pi = 0; pi < PRINCIPLES.length; pi++) {
    var pr = PRINCIPLES[pi];
    var bg2 = pi % 2 ? "var(--surface)" : "transparent";
    princRows += '<div class="prin-row" style="background:' + bg2 + '">' +
      '<div class="prin-title">' + pr[0] + '</div>' +
      '<div class="prin-desc">' + pr[1] + '</div></div>';
  }

  g("v-overview").innerHTML =
    '<div class="page-header"><h1>PROGRAM <span>OVERVIEW</span></h1><p>5-Day Split - PPL + Delts + Chest/Back</p></div>' +
    '<div class="ov-content">' +
      phaseCards +
      '<div class="info-card"><div class="info-card-head">WEEKLY SPLIT</div>' + splitRows + '</div>' +
      '<div class="info-card"><div class="info-card-head">PRINCIPLES</div>' + princRows + '</div>' +
      '<div style="height:8px"></div>' +
    '</div>';
}
